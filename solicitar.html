<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrediSmart - Solicitar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-white">

    <!--logo superior y menu-->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark-blue py-3">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">
                <img src="img/logo.png" alt="Logo" width="150" class="me-2"></a>

            <div class="ms-auto">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link text-white" href="index.html">INICIO</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="simulador.html">SIMULADOR</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="solicitar.html">SOLICITAR</a></li>
                </ul>
        </div>
    </nav>

    <main class="container my-5">
        <h1 class="fw-bold mb-4">FORMULARIO</h1>

        <div class="row">
            <div class="col-md-7">
                <form id="formSolicitud">
                    
                    <!--formulario datos personales-->
                    <div class="bg-light p-4 mb-4 rounded shadow-sm">
                        <h5 class="fw-bold border-bottom pb-2 mb-3">Datos personales</h5>
                        <div class="mb-3">
                            <label class="form-label text-orange fw-bold small">Nombre Completo</label>
                            <input type="text" class="form-control border-dark" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label text-orange fw-bold small">Cédula</label>
                                <input type="number" class="form-control border-dark" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label text-orange fw-bold small">Email</label>
                                <input type="email" class="form-control border-dark" required>
                            </div>
                        </div>
                        <div class="mb-2">
                            <label class="form-label text-orange fw-bold small">Teléfono</label>
                            <input type="tel" class="form-control border-dark" required>
                        </div>
                    </div>

                    <!--formulario datos del credito-->
                    <div class="bg-light p-4 mb-4 rounded shadow-sm">
                        <h5 class="fw-bold border-bottom pb-2 mb-3">Datos del crédito</h5>
                        <div class="mb-3">
                            <label class="form-label text-orange fw-bold small">Tipo de crédito</label>
                            <select class="form-select border-dark">
                                <option selected disabled>Seleccione un producto</option>
                                <option>Crédito vivienda</option>
                                <option>Libre inversión</option>
                                <option>Crédito vehículo</option>
                                <option>Crédito Educativo</option>
                                <option>Crédito empresarial</option>
                                <option>Crédito cartera</option>
                            </select>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label text-orange fw-bold small">Monto solicitado</label>
                                <input type="number" class="form-control border-dark" placeholder="$">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label text-orange fw-bold small">Plazo en meses</label>
                                <select class="form-select border-dark">
                                    <option>12 Meses</option>
                                    <option>24 Meses</option>
                                    <option>36 Meses</option>
                                    <option>48 Meses</option>
                                    <option>60 Meses</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-2">
                            <label class="form-label text-orange fw-bold small">Destino del crédito</label>
                            <textarea class="form-control border-dark" rows="2"></textarea>
                        </div>
                    </div>

                    <!--formulario datos laborales-->
                    <div class="bg-light p-4 mb-4 rounded shadow-sm">
                        <h5 class="fw-bold border-bottom pb-2 mb-3">Datos laborales</h5>
                        <div class="mb-3">
                            <label class="form-label text-orange fw-bold small">Empresa donde trabaja</label>
                            <input type="text" class="form-control border-dark">
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label text-orange fw-bold small">Cargo</label>
                                <input type="text" class="form-control border-dark">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label text-orange fw-bold small">Ingresos mensuales</label>
                                <input type="number" class="form-control border-dark" placeholder="$">
                            </div>
                        </div>
                    </div>

                    <div class="d-grid gap-3 mt-4">
                        <button type="submit" class="btn btn-orange btn-lg">Enviar solicitud</button>
                        <button type="reset" class="btn btn-orange btn-lg opacity-75">Limpiar formulario</button>
                    </div>
                </form>
            </div>

            <!--logo derecho-->
            <div class="col-md-5 d-none d-md-flex align-items-center justify-content-center">
                <img src="img/logo.png" alt="CrediSmart Logo" class="img-fluid opacity-25" style="max-width: 80%;">
            </div>
        </div>
    </main>

    <footer class="footer-naranja"></footer>

</body>
</html>
